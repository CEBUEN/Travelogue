<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelogue Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Travelogue</h1>
            <div id="auth-section">
                <form id="login-form">
                    <input type="text" id="username" placeholder="Username" required>
                    <div>
                        <input type="password" id="password" placeholder="Password" required>
                        <input type="checkbox" id="show-password">
                        <label for="show-password">Show Password</label>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <button id="logout-button" style="display: none;">Logout</button>
                <button id="signup-button">Sign Up</button>
            </div>
        </header>
        <main id="board" style="display: none;"></main>
        <div id="signup-modal" style="display: none;">
            <h2>Sign Up</h2>
            <form id="signup-form">
                <input type="text" id="signup-username" placeholder="Username" required>
                <div>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <input type="checkbox" id="signup-show-password">
                    <label for="signup-show-password">Show Password</label>
                </div>
                <div>
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                    <input type="checkbox" id="confirm-show-password">
                    <label for="confirm-show-password">Show Password</label>
                </div>
                <button type="submit">Create Account</button>
            </form>
            <button id="close-signup">Close</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
